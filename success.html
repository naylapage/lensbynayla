<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message envoyé — Nayla Pagé</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root { --black: #0a0a0a; --white: #f5f4f0; --accent: #c8a96e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 48px;
  }
  .container { max-width: 480px; }
  .check { font-size: 48px; margin-bottom: 32px; }
  .label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 8vw, 72px);
    line-height: 1; margin-bottom: 24px;
  }
  p { font-size: 13px; opacity: 0.6; line-height: 1.9; margin-bottom: 48px; }
  a {
    display: inline-block; padding: 14px 36px;
    background: var(--accent); color: var(--black);
    text-decoration: none; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
    transition: opacity 0.2s;
  }
  a:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="container">
    <div class="check">✉️</div>
    <p class="label">Confirmation</p>
    <h1>Message envoyé!</h1>
    <p>Merci pour ton message. Nayla te répondra dans les plus brefs délais.</p>
    <a href="/">Retour au site →</a>
  </div>
</body>
</html>
